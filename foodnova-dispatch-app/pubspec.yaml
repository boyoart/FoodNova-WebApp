name: foodnova_dispatch_app
description: FoodNova Dispatch Android app for approved riders and delivery partners.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.2
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.10.0
  image_picker: ^1.1.2
  intl: ^0.20.1
  local_auth: ^2.3.0
  shared_preferences: ^2.3.3
  signature: ^5.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/foodnova-logo.png
