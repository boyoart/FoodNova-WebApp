<style>

<body class="bg-surface text-on-surface antialiased h-screen flex flex-col justify-center items-center px-container-margin-mobile">
<!-- Main Container -->
<main class="w-full max-w-md mx-auto relative z-10 flex flex-col gap-section-gap">
<!-- Back Button (Subtle, for transactional flow) -->
<div class="absolute -top-16 left-0">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
</div>
<!-- Header Section -->
<header class="text-center md:text-left flex flex-col gap-unit">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Verification Code</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                We've sent a 4-digit code to<br/>
<span class="font-bold text-on-surface mt-1 block">+1 ••• ••• 4242</span>
</p>
</header>
<!-- OTP Form -->
<form autocomplete="off" class="flex flex-col gap-8 w-full" id="otp-form">
<!-- OTP Input Group -->
<div class="flex justify-between md:justify-start md:gap-4 w-full" id="otp-inputs">
<input aria-label="Digit 1" autofocus="" class="w-[72px] h-[80px] text-center font-headline-lg text-headline-lg bg-surface border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all shadow-[0_4px_20px_rgba(0,0,0,0.02)]" maxlength="1" pattern="\d*" type="number"/>
<input aria-label="Digit 2" class="w-[72px] h-[80px] text-center font-headline-lg text-headline-lg bg-surface border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all shadow-[0_4px_20px_rgba(0,0,0,0.02)]" maxlength="1" pattern="\d*" type="number"/>
<input aria-label="Digit 3" class="w-[72px] h-[80px] text-center font-headline-lg text-headline-lg bg-surface border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all shadow-[0_4px_20px_rgba(0,0,0,0.02)]" maxlength="1" pattern="\d*" type="number"/>
<input aria-label="Digit 4" class="w-[72px] h-[80px] text-center font-headline-lg text-headline-lg bg-surface border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all shadow-[0_4px_20px_rgba(0,0,0,0.02)]" maxlength="1" pattern="\d*" type="number"/>
</div>
<!-- Resend Section -->
<div class="text-center md:text-left mt-2">
<p class="font-body-md text-body-md text-on-surface-variant flex items-center justify-center md:justify-start gap-2">
                    Didn't receive the code? 
                    <button class="font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled="" id="resend-btn" type="button">
                        Resend in <span id="timer">00:30</span>
</button>
</p>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary-container text-on-primary font-label-lg text-label-lg rounded-full flex items-center justify-center gap-2 hover:scale-[1.02] active:scale-95 transition-transform shadow-[0_10px_30px_rgba(20,83,45,0.15)] mt-4" type="submit">
                Verify &amp; Continue
            </button>
</form>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('#otp-inputs input');
            
            // Focus Management for OTP Inputs
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Ensure only one digit
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }
                    // Auto-focus next input
                    if (e.target.value !== '' && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                input.addEventListener('keydown', (e) => {
                    // Auto-focus previous input on backspace if empty
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });

            // Simple Countdown Timer
            let timeLeft = 30;
            const timerElement = document.getElementById('timer');
            const resendBtn = document.getElementById('resend-btn');

            const countdown = setInterval(() => {
                timeLeft--;
                const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                timerElement.textContent = `00:${seconds}`;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerElement.textContent = '';
                    resendBtn.textContent = 'Resend Code';
                    resendBtn.removeAttribute('disabled');
                    resendBtn.classList.remove('opacity-50');
                }
            }, 1000);
        });
    </script>
