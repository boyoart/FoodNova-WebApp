<!DOCTYPE html>

<style>
        /* Hide scrollbar for clean aesthetic */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom radio button animations */
        .radio-indicator { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="radio"]:checked + .radio-indicator {
            border-color: #003b1b;
            background-color: #003b1b;
        }
        input[type="radio"]:checked + .radio-indicator .inner-dot {
            opacity: 1;
            transform: scale(1);
        }
        .inner-dot {
            transition: all 0.2s ease-out;
            transform: scale(0.5);
            opacity: 0;
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(249, 249, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md min-h-screen pb-32 antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- 
      TRANSACTIONAL FLOW HEADER
      Replacing the global TopAppBar as per "Semantic Shell Mandate: Automatic Suppression" for linear checkout journeys.
    -->
<header class="sticky top-0 z-40 w-full glass-panel px-container-margin-mobile py-4 flex items-center justify-between shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile text-on-surface font-bold tracking-tight">Checkout</h1>
<div class="w-10 h-10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[20px]">lock</span>
</div>
</header>
<main class="max-w-3xl mx-auto w-full">
<!-- Order Total Section -->
<section class="flex flex-col items-center justify-center py-10 px-container-margin-mobile">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-[0.1em] mb-2">Total Amount</span>
<div class="flex items-baseline gap-1">
<span class="font-headline-lg text-headline-lg text-primary self-start mt-1">$</span>
<h2 class="font-display-lg-mobile text-display-lg-mobile text-primary font-bold tracking-tight">84.50</h2>
</div>
<p class="font-label-md text-label-md text-on-surface-variant/70 mt-2">Including taxes &amp; delivery</p>
</section>
<!-- Wallet / Credits Section -->
<section class="px-container-margin-mobile mb-section-gap">
<div class="bg-surface-container-lowest border border-outline-variant/30 shadow-[0_8px_30px_rgba(0,0,0,0.03)] rounded-2xl p-5 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">FoodNova Balance</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-[14px] mt-0.5">Available: $15.00</p>
</div>
</div>
<!-- Custom Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary shadow-sm"></div>
</label>
</div>
</section>
<!-- Payment Methods Layout -->
<section class="px-container-margin-mobile flex flex-col gap-4">
<h3 class="font-headline-md text-headline-md text-on-surface mb-2 px-1">Payment Method</h3>
<!-- Apple Pay Option -->
<label class="flex items-center p-5 bg-surface-container-lowest border border-outline-variant/40 rounded-2xl cursor-pointer hover:border-primary/30 transition-all group">
<input class="hidden peer" name="payment_method" type="radio"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant/60 flex items-center justify-center mr-4 radio-indicator peer-checked:border-primary">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary inner-dot"></div>
</div>
<div class="flex-1 flex items-center justify-between">
<span class="font-label-lg text-label-lg text-on-surface text-[16px]">Apple Pay</span>
<div class="h-8 w-14 bg-black rounded-md flex items-center justify-center shadow-sm">
<!-- Simulated Apple Logo text for constraint compliance -->
<span class="font-display-lg text-white text-[14px] font-bold tracking-tighter">Pay</span>
</div>
</div>
</label>
<!-- Credit Card Option (Active by default) -->
<label class="flex flex-col bg-surface-container-lowest border border-primary/40 shadow-[0_0_0_1px_rgba(0,59,27,0.1)] rounded-2xl cursor-pointer transition-all overflow-hidden relative">
<input checked="" class="hidden peer" name="payment_method" type="radio"/>
<!-- Option Header -->
<div class="p-5 flex items-center border-b border-outline-variant/20 bg-primary/5">
<div class="w-6 h-6 rounded-full border-2 border-primary bg-primary flex items-center justify-center mr-4">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-100 transform scale-100"></div>
</div>
<span class="font-label-lg text-label-lg text-on-surface text-[16px] font-bold">Credit or Debit Card</span>
</div>
<!-- Visual Card Entry Form Area -->
<div class="p-6 flex flex-col gap-8 bg-surface-container-lowest">
<!-- Visual Card Representation -->
<div class="w-full max-w-[340px] mx-auto h-[200px] rounded-[20px] bg-gradient-to-br from-[#0a1a14] via-primary to-primary-container p-6 flex flex-col justify-between shadow-[0_16px_32px_rgba(0,33,13,0.15)] relative overflow-hidden isolate">
<!-- Atmospheric Glass Overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/5 to-white/0 -rotate-45 transform scale-[1.5] translate-x-1/4 pointer-events-none"></div>
<div class="flex justify-between items-start z-10 w-full">
<!-- Premium Chip Visual -->
<div class="w-11 h-8 rounded-md bg-gradient-to-br from-secondary-fixed to-secondary-container border border-secondary/20 flex flex-col justify-evenly px-[3px] py-[2px] opacity-90">
<div class="w-full h-[1px] bg-secondary/30"></div>
<div class="w-full h-[1px] bg-secondary/30"></div>
<div class="w-full h-[1px] bg-secondary/30"></div>
</div>
<span class="material-symbols-outlined text-white/60 text-[28px]">contactless</span>
</div>
<div class="z-10 w-full space-y-4">
<p class="font-display-lg text-display-lg text-white/90 tracking-[0.15em] text-[22px] leading-none drop-shadow-sm font-medium">**** **** **** 4242</p>
<div class="flex justify-between items-end w-full">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-white/50 uppercase tracking-wider text-[10px] mb-1">Cardholder</span>
<p class="font-label-lg text-label-lg text-white/90 tracking-wide">Sarah Jenkins</p>
</div>
<div class="flex flex-col text-right">
<span class="font-label-md text-label-md text-white/50 uppercase tracking-wider text-[10px] mb-1">Expires</span>
<p class="font-label-lg text-label-lg text-white/90 tracking-wide">09/28</p>
</div>
</div>
</div>
</div>
<!-- Input Fields -->
<div class="grid grid-cols-2 gap-4">
<div class="col-span-2 relative">
<label class="sr-only">Card Number</label>
<input class="w-full bg-surface border border-outline-variant/50 rounded-xl px-4 py-3.5 font-label-lg text-label-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-on-surface-variant/40" placeholder="Card Number" type="text" value="**** **** **** 4242"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 font-label-lg text-primary text-[12px] bg-primary/10 px-2 py-1 rounded">VISA</span>
</div>
<div class="relative">
<label class="sr-only">Expiration Date</label>
<input class="w-full bg-surface border border-outline-variant/50 rounded-xl px-4 py-3.5 font-label-lg text-label-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-on-surface-variant/40" placeholder="MM/YY" type="text" value="09/28"/>
</div>
<div class="relative">
<label class="sr-only">CVC</label>
<input class="w-full bg-surface border border-outline-variant/50 rounded-xl px-4 py-3.5 font-label-lg text-label-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-on-surface-variant/40" placeholder="CVC" type="password" value="***"/>
</div>
</div>
</div>
</label>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full glass-panel border-t border-white/20 px-container-margin-mobile pt-4 pb-8 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
<div class="max-w-3xl mx-auto flex items-center justify-between gap-4">
<div class="flex flex-col hidden sm:flex">
<span class="font-label-md text-label-md text-on-surface-variant">Total</span>
<span class="font-headline-md text-headline-md text-on-surface font-bold">$84.50</span>
</div>
<button class="flex-1 bg-primary text-on-primary h-14 rounded-full font-label-lg text-label-lg text-[16px] flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform duration-300 shadow-[0_8px_20px_rgba(0,59,27,0.25)] active:scale-95">
                Place Order
                <span class="material-symbols-outlined text-[20px] ml-1">arrow_forward</span>
</button>
</div>
</div>
</body></html>
