<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 300,
          'GRAD' 0,
          'opsz' 24

            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center">
<main class="w-full max-w-md mx-auto px-container-margin-mobile pt-16 pb-24 flex flex-col h-full min-h-screen">
<!-- Header Section -->
<header class="mb-section-gap text-center">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-4">Complete Profile</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Let's set up your FoodNova experience.</p>
</header>
<!-- Profile Photo Upload -->
<section class="flex flex-col items-center mb-section-gap">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-surface-container-highest border border-outline-variant flex items-center justify-center overflow-hidden shadow-sm transition-transform duration-300 group-hover:scale-105">
<span class="material-symbols-outlined text-4xl text-outline-variant group-hover:text-primary transition-colors duration-300">add_a_photo</span>
</div>
<div class="absolute bottom-0 right-0 bg-secondary-container rounded-full p-2 shadow-sm">
<span class="material-symbols-outlined text-on-secondary-container text-sm fill-icon">edit</span>
</div>
</div>
</section>
<!-- Form Fields -->
<form class="flex-1 flex flex-col gap-6 w-full">
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline-variant shadow-sm outline-none" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline-variant shadow-sm outline-none" id="email" placeholder="jane.doe@example.com" type="email"/>
</div>
</div>
<div class="mt-4 mb-section-gap">
<p class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider mb-4">Delivery Preference</p>
<div class="grid grid-cols-2 gap-4">
<!-- Home Preference -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="deliveryPref" type="radio" value="home"/>
<div class="p-4 rounded-xl border border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/10 transition-all duration-300 shadow-sm flex flex-col items-center gap-2 group hover:shadow-[0_10px_20px_rgba(0,0,0,0.02)]">
<span class="material-symbols-outlined text-outline-variant peer-checked:text-primary peer-checked:fill-icon transition-colors">home</span>
<span class="font-label-lg text-label-lg text-on-surface-variant peer-checked:text-primary">Home</span>
</div>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-sm fill-icon">check_circle</span>
</div>
</label>
<!-- Work Preference -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="deliveryPref" type="radio" value="work"/>
<div class="p-4 rounded-xl border border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/10 transition-all duration-300 shadow-sm flex flex-col items-center gap-2 group hover:shadow-[0_10px_20px_rgba(0,0,0,0.02)]">
<span class="material-symbols-outlined text-outline-variant peer-checked:text-primary peer-checked:fill-icon transition-colors">work</span>
<span class="font-label-lg text-label-lg text-on-surface-variant peer-checked:text-primary">Work</span>
</div>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-sm fill-icon">check_circle</span>
</div>
</label>
</div>
</div>
<!-- Primary Action Button -->
<div class="mt-auto pt-8">
<button class="w-full min-h-[56px] bg-primary text-on-primary rounded-full font-label-lg text-label-lg flex items-center justify-center gap-2 shadow-[0_10px_20px_rgba(0,59,27,0.2)] hover:scale-[1.02] transition-transform duration-300" type="button">
                    Start Exploring
                    <span class="material-symbols-outlined text-on-primary">arrow_forward</span>
</button>
</div>
</form>
