<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Complete Your Profile - FoodNova</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600&amp;family=Manrope:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-highest": "#dce2f7",
                      "primary-fixed": "#b1f2be",
                      "secondary": "#735c00",
                      "outline": "#717970",
                      "on-secondary-fixed": "#231b00",
                      "surface-tint": "#2e6a41",
                      "secondary-fixed": "#ffe083",
                      "on-tertiary": "#ffffff",
                      "tertiary": "#31332b",
                      "surface-variant": "#dce2f7",
                      "error-container": "#ffdad6",
                      "on-tertiary-container": "#b8b8ad",
                      "inverse-surface": "#293040",
                      "error": "#ba1a1a",
                      "tertiary-container": "#484941",
                      "surface-container-high": "#e1e8fd",
                      "on-primary-fixed": "#00210d",
                      "primary-container": "#14532d",
                      "outline-variant": "#c0c9be",
                      "inverse-primary": "#96d5a3",
                      "surface-container-low": "#f1f3ff",
                      "surface-bright": "#f9f9ff",
                      "on-tertiary-fixed-variant": "#46473f",
                      "inverse-on-surface": "#edf0ff",
                      "primary": "#003b1b",
                      "surface-container-lowest": "#ffffff",
                      "on-error-container": "#93000a",
                      "on-background": "#141b2b",
                      "on-primary-fixed-variant": "#12512c",
                      "on-primary": "#ffffff",
                      "on-secondary-container": "#6f5900",
                      "tertiary-fixed-dim": "#c7c7bc",
                      "on-primary-container": "#87c695",
                      "primary-fixed-dim": "#96d5a3",
                      "on-secondary-fixed-variant": "#574500",
                      "background": "#f9f9ff",
                      "on-error": "#ffffff",
                      "on-surface-variant": "#404941",
                      "on-secondary": "#ffffff",
                      "tertiary-fixed": "#e4e3d7",
                      "surface-container": "#e9edff",
                      "on-tertiary-fixed": "#1b1c15",
                      "surface-dim": "#d3daef",
                      "secondary-container": "#fed01b",
                      "on-surface": "#141b2b",
                      "surface": "#f9f9ff",
                      "secondary-fixed-dim": "#eec200"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "section-gap": "48px",
                      "container-margin-mobile": "20px",
                      "gutter": "24px",
                      "container-margin-desktop": "64px",
                      "unit": "8px"
              },
              "fontFamily": {
                      "body-md": [
                              "Manrope"
                      ],
                      "headline-lg": [
                              "Manrope"
                      ],
                      "body-lg": [
                              "Manrope"
                      ],
                      "label-md": [
                              "Hanken Grotesk"
                      ],
                      "display-lg-mobile": [
                              "Manrope"
                      ],
                      "display-lg": [
                              "Manrope"
                      ],
                      "label-lg": [
                              "Hanken Grotesk"
                      ],
                      "headline-md": [
                              "Manrope"
                      ]
              },
              "fontSize": {
                      "body-md": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "600"
                              }
                      ],
                      "body-lg": [
                              "18px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "400"
                              }
                      ],
                      "label-md": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "fontWeight": "500"
                              }
                      ],
                      "display-lg-mobile": [
                              "36px",
                              {
                                      "lineHeight": "44px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "display-lg": [
                              "48px",
                              {
                                      "lineHeight": "56px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "label-lg": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "600"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "fontWeight": "600"
                              }
                      ]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 300,
          'GRAD' 0,
          'opsz' 24
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Hide scrollbar for horizontal scrolling containers */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center">
<main class="w-full max-w-md mx-auto flex flex-col h-full min-h-screen relative pb-32">
<!-- Header Section -->
<header class="mb-8 text-center pt-20 px-container-margin-mobile">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-4">Complete Profile</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Let's set up your FoodNova experience.</p>
</header>
<!-- Profile Photo Upload -->
<section class="flex flex-col items-center mb-10 px-container-margin-mobile">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden shadow-md ring-4 ring-surface-container-lowest transition-transform duration-300 group-hover:scale-105">
<span class="material-symbols-outlined text-4xl text-outline-variant group-hover:text-primary transition-colors duration-300">add_a_photo</span>
</div>
<div class="absolute bottom-1 right-1 bg-secondary-container rounded-full p-2.5 shadow-md border-2 border-surface-container-lowest">
<span class="material-symbols-outlined text-on-secondary-container text-sm fill-icon leading-none">edit</span>
</div>
</div>
</section>
<!-- Form Fields -->
<form class="flex-1 flex flex-col gap-8 w-full px-container-margin-mobile">
<!-- Basic Info Group -->
<div class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline-variant shadow-sm outline-none" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline-variant shadow-sm outline-none" id="email" placeholder="jane.doe@example.com" type="email"/>
</div>
</div>
<!-- Gender Selection -->
<div class="flex flex-col gap-3">
<label class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider">Gender</label>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="male"/>
<span class="inline-block px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary-container peer-checked:border-primary-container peer-checked:text-on-primary-container transition-colors shadow-sm">Male</span>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="female"/>
<span class="inline-block px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary-container peer-checked:border-primary-container peer-checked:text-on-primary-container transition-colors shadow-sm">Female</span>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="nonbinary"/>
<span class="inline-block px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary-container peer-checked:border-primary-container peer-checked:text-on-primary-container transition-colors shadow-sm">Non-binary</span>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="prefer-not"/>
<span class="inline-block px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary-container peer-checked:border-primary-container peer-checked:text-on-primary-container transition-colors shadow-sm">Prefer not to say</span>
</label>
</div>
</div>
</div>
<div class="h-px w-full bg-outline-variant/30 my-2"></div>
<!-- Delivery Preferences -->
<div class="flex flex-col gap-4">
<p class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider">Delivery Preference</p>
<div class="grid grid-cols-2 gap-4">
<!-- Home Preference -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="deliveryPref" type="radio" value="home"/>
<div class="p-5 rounded-xl border border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/5 transition-all duration-300 shadow-sm flex flex-col items-center gap-3 group hover:shadow-md">
<span class="material-symbols-outlined text-outline-variant text-3xl peer-checked:text-primary peer-checked:fill-icon transition-colors">home</span>
<span class="font-label-lg text-label-lg text-on-surface-variant peer-checked:text-primary">Home</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-xl fill-icon">check_circle</span>
</div>
</label>
<!-- Work Preference -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="deliveryPref" type="radio" value="work"/>
<div class="p-5 rounded-xl border border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/5 transition-all duration-300 shadow-sm flex flex-col items-center gap-3 group hover:shadow-md">
<span class="material-symbols-outlined text-outline-variant text-3xl peer-checked:text-primary peer-checked:fill-icon transition-colors">work</span>
<span class="font-label-lg text-label-lg text-on-surface-variant peer-checked:text-primary">Work</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-xl fill-icon">check_circle</span>
</div>
</label>
</div>
</div>
<!-- Food Preferences -->
<div class="flex flex-col gap-3 -mx-container-margin-mobile px-container-margin-mobile">
<p class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider">Food Preferences</p>
<div class="flex overflow-x-auto hide-scrollbar gap-3 pb-2 pt-1 -mx-4 px-4 sm:mx-0 sm:px-0">
<label class="cursor-pointer shrink-0">
<input class="peer sr-only" type="checkbox" value="organic"/>
<span class="inline-block px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary peer-checked:border-primary peer-checked:text-on-primary transition-colors shadow-sm">Organic</span>
</label>
<label class="cursor-pointer shrink-0">
<input class="peer sr-only" type="checkbox" value="vegan"/>
<span class="inline-block px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary peer-checked:border-primary peer-checked:text-on-primary transition-colors shadow-sm">Vegan</span>
</label>
<label class="cursor-pointer shrink-0">
<input class="peer sr-only" type="checkbox" value="gluten-free"/>
<span class="inline-block px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary peer-checked:border-primary peer-checked:text-on-primary transition-colors shadow-sm">Gluten-Free</span>
</label>
<label class="cursor-pointer shrink-0">
<input class="peer sr-only" type="checkbox" value="keto"/>
<span class="inline-block px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary peer-checked:border-primary peer-checked:text-on-primary transition-colors shadow-sm">Keto</span>
</label>
<label class="cursor-pointer shrink-0">
<input class="peer sr-only" type="checkbox" value="quick-meals"/>
<span class="inline-block px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary peer-checked:border-primary peer-checked:text-on-primary transition-colors shadow-sm">Quick Meals</span>
</label>
<label class="cursor-pointer shrink-0">
<input class="peer sr-only" type="checkbox" value="gourmet"/>
<span class="inline-block px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary peer-checked:border-primary peer-checked:text-on-primary transition-colors shadow-sm">Gourmet</span>
</label>
<label class="cursor-pointer shrink-0">
<input class="peer sr-only" type="checkbox" value="dairy-free"/>
<span class="inline-block px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md peer-checked:bg-primary peer-checked:border-primary peer-checked:text-on-primary transition-colors shadow-sm">Dairy-Free</span>
</label>
</div>
</div>
</form>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-surface/80 backdrop-blur-md border-t border-outline-variant/20 z-10 flex justify-center">
<div class="w-full max-w-md">
<button class="w-full min-h-[56px] bg-[#14532D] text-white rounded-full font-label-lg text-label-lg flex items-center justify-center gap-2 shadow-lg hover:bg-primary-container/90 hover:scale-[1.02] transition-all duration-300" type="button">
        Start Exploring
        <span class="material-symbols-outlined text-white">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
