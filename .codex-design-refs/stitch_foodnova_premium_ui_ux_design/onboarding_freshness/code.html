<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const nextBtn = document.querySelector('button.w-full.min-h-\\[56px\\]');
            
            // Add a subtle ripple effect on click for the premium feel
            nextBtn.addEventListener('click', function(e) {
                let ripple = document.createElement('div');
                this.appendChild(ripple);
                
                let rect = this.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.position = 'absolute';
                ripple.style.width = '0px';
                ripple.style.height = '0px';
                ripple.style.background = 'rgba(255, 255, 255, 0.4)';
                ripple.style.borderRadius = '50%';
                ripple.style.transform = 'translate(-50%, -50%)';
                ripple.style.transition = 'width 0.4s ease-out, height 0.4s ease-out, opacity 0.4s ease-out';
                
                // Force reflow
                ripple.getBoundingClientRect();
                
                ripple.style.width = '300px';
                ripple.style.height = '300px';
                ripple.style.opacity = '0';
                
                setTimeout(() => {
                    ripple.remove();
                    // Optional: transition to next screen visually here before redirect
                }, 400);
            });
        });
    </script>
