name: foodnova_customer_app
description: FoodNova native Android customer commerce app.
publish_to: "none"
version: 0.1.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  intl: ^0.20.1
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.0
  open_filex: ^4.7.0
  share_plus: ^10.1.4
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  firebase_analytics: ^11.3.6
  firebase_crashlytics: ^4.1.6
  flutter_local_notifications: ^18.0.1
  socket_io_client: ^3.0.2
  image_picker: ^1.1.2
  file_picker: ^10.1.9
  google_maps_flutter: ^2.10.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/foodnova-logo.png
    - assets/images/
